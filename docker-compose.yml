name: ecom-logistics

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  osrm:
    image: osrm/osrm-backend
    ports:
      - "5000:5000"
    volumes:
      - ./src/smart_delivery_routing/infrastructure/osrm/data:/data
    command: osrm-routed --algorithm mld /data/south-vietnam.osrm --max-table-size 2000

  api:
    build: .
    command: python main.py api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OSRM_URL: http://osrm:5000
      FIREBASE_CREDENTIALS: /app/firebase-service-account.json
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - redis
      - osrm

  worker:
    build: .
    command: celery -A smart_delivery_routing.infrastructure.celery worker --loglevel=info
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OSRM_URL: http://osrm:5000
      FIREBASE_CREDENTIALS: /app/firebase-service-account.json
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - redis
      - osrm

  beat:
    build: .
    command: celery -A smart_delivery_routing.infrastructure.celery beat --loglevel=info
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OSRM_URL: http://osrm:5000
    depends_on:
      - redis
